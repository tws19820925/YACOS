<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=privacy_policy.html">
    <title>YACOS FORTUNE TELLING</title>
    <meta name="description" content="YACOS FORTUNE TELLINGのアプリ紹介とプライバシーポリシーです。">
    <link rel="canonical" href="privacy_policy.html">
    <link rel="icon" type="image/webp" href="assets/promo/yacos-icon.webp">
    <style>
        :root {
            color-scheme: light;
            --bg: #eef6f3;
            --paper: #ffffff;
            --ink: #1f2532;
            --muted: #5d6675;
            --line: #d9e4df;
            --plum: #332047;
            --teal: #0f766e;
            --gold: #d5a73d;
            --shadow: 0 18px 42px rgba(31, 37, 50, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", system-ui, sans-serif;
            background:
                linear-gradient(180deg, rgba(238, 246, 243, 0.96), rgba(255, 255, 255, 0.98)),
                var(--bg);
            color: var(--ink);
            line-height: 1.75;
        }

        main {
            width: min(100%, 560px);
            padding: 26px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--paper);
            box-shadow: var(--shadow);
        }

        h1 {
            margin: 0 0 8px;
            color: var(--plum);
            font-size: 26px;
            line-height: 1.35;
            letter-spacing: 0;
        }

        p {
            margin: 0;
            color: var(--muted);
            overflow-wrap: anywhere;
        }

        a {
            color: var(--teal);
            font-weight: 800;
            text-underline-offset: 0.18em;
        }

        a:focus-visible {
            outline: 3px solid var(--gold);
            outline-offset: 4px;
        }
    </style>
</head>
<body>
<main>
    <h1>YACOS FORTUNE TELLING</h1>
    <p>アプリ紹介とプライバシーポリシーへ移動します。自動で移動しない場合は、<a href="privacy_policy.html">こちら</a>をご覧ください。</p>
</main>
</body>
</html>
